<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Song Young-min Guitar Lab - Sky Climber</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050816; font-family: 'Arial', sans-serif; user-select: none; -webkit-touch-callout: none; }
        canvas { display: block; }

        /* UI 레이아웃 */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        #joystick-container {
            position: absolute; bottom: 60px; left: 40px;
            width: 100px; height: 100px; background: rgba(255, 255, 255, 0.1);
            border-radius: 50%; pointer-events: auto; touch-action: none;
            border: 2px solid rgba(255,255,255,0.2);
        }
        #joystick-knob {
            position: absolute; top: 30px; left: 30px;
            width: 40px; height: 40px; background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
        }

        #btn-jump {
            position: absolute; bottom: 70px; right: 40px;
            width: 85px; height: 85px; background: #000080; 
            border-radius: 50%; border: 3px solid #ffffff;
            color: white; font-size: 16px; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            pointer-events: auto; touch-action: none;
        }

        /* 2. 스코어 대신 미터(M) 표시 */
        #altitude { position: absolute; top: 30px; width: 100%; text-align: center; font-size: 28px; color: #ffd700; font-weight: bold; text-shadow: 0 0 10px rgba(0,0,0,0.8); }

        /* 4. 게임오버 팝업 */
        #game-over {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); border: 2px solid #ffd700; padding: 30px;
            color: white; text-align: center; display: none; pointer-events: auto;
            border-radius: 15px; width: 250px;
        }
        #restart-btn { margin-top: 15px; padding: 10px 20px; background: #ffd700; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }

        /* 5. 하단 워터마크 */
        #watermark {
            position: absolute; bottom: 15px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.4); font-size: 12px; letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div id="altitude">0 M</div>
<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
    <div id="joystick-container"><div id="joystick-knob"></div></div>
    <div id="btn-jump">JUMP</div>
    <div id="game-over">
        <h2 style="color: #e74c3c;">GAME OVER</h2>
        <p id="final-m"></p>
        <button id="restart-btn">다시 시작하시겠습니까?</button>
    </div>
    <div id="watermark">SONG, YOUNG-MIN Guitar Lab</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const altitudeEl = document.getElementById('altitude');
    const gameOverEl = document.getElementById('game-over');
    const finalMEl = document.getElementById('final-m');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 1. 효과음 로직 개선 (지직거림 방지)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playCleanSound(freq, type, duration, vol) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    // 게임 변수
    const gravity = 0.7;
    let platforms = [];
    let currentM = 0;
    let maxM = 0;
    let gameState = 'playing';
    let jumpCount = 0; // 3. 이단 점프용

    const player = {
        x: 0, y: 0, width: 36, height: 60,
        vx: 0, vy: 0, speed: 6,
        jumpPower: -18, dizzy: 0
    };

    function initGame() {
        platforms = [];
        currentM = 0;
        maxM = 0;
        jumpCount = 0;
        gameState = 'playing';
        gameOverEl.style.display = 'none';
        player.x = canvas.width / 2 - 18;
        player.y = canvas.height - 150;
        player.vy = 0;

        // 초기 발판
        platforms.push({ x: 0, y: canvas.height - 50, w: canvas.width, h: 50, m: 0 });
        for (let i = 1; i < 25; i++) {
            addPlatform(i);
        }
    }

    function addPlatform(index) {
        const lastP = platforms[platforms.length - 1];
        platforms.push({
            x: Math.random() * (canvas.width - 100),
            y: canvas.height - (index * 130),
            w: 90, h: 20, m: index
        });
    }

    // 조이스틱/점프 컨트롤
    let moveDir = 0;
    const joystick = document.getElementById('joystick-container');
    const knob = document.getElementById('joystick-knob');
    
    joystick.addEventListener('touchmove', (e) => {
        if (gameState !== 'playing') return;
        const touch = e.touches[0];
        const rect = joystick.getBoundingClientRect();
        const dx = touch.clientX - (rect.left + 50);
        const dist = Math.min(Math.abs(dx), 40);
        knob.style.transform = `translateX(${Math.sign(dx) * dist}px)`;
        moveDir = (dx / 40);
    });

    joystick.addEventListener('touchend', () => {
        knob.style.transform = `translate(0,0)`;
        moveDir = 0;
    });

    // 3. 이단 점프 구현
    document.getElementById('btn-jump').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (gameState !== 'playing') return;
        
        if (jumpCount < 2) {
            player.vy = player.jumpPower * (jumpCount === 1 ? 1.2 : 1); // 두번째는 더 높게
            jumpCount++;
            playCleanSound(400 + (jumpCount * 100), 'triangle', 0.1, 0.1);
        }
    });

    function update() {
        if (gameState === 'dead') return;

        player.vx = moveDir * player.speed;
        player.vy += gravity;
        player.x += player.vx;
        player.y += player.vy;

        if (player.x < 0) player.x = 0;
        if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

        // 충돌 및 착지
        platforms.forEach(p => {
            if (player.vy > 0 && player.x + player.width > p.x && player.x < p.x + p.w &&
                player.y + player.height > p.y && player.y + player.height < p.y + p.h + player.vy) {
                
                player.y = p.y - player.height;
                player.vy = 0;
                jumpCount = 0; // 점프 초기화
                
                if (p.m > maxM) {
                    maxM = p.m;
                    altitudeEl.innerText = `${maxM} M`;
                }
                // 착지음
                if (player.vy === 0) playCleanSound(150, 'sine', 0.05, 0.2);
            }
        });

        // 카메라 스크롤
        if (player.y < canvas.height / 2) {
            let diff = canvas.height / 2 - player.y;
            player.y += diff;
            platforms.forEach(p => p.y += diff);
            // 새 발판 생성
            if (platforms[0].y > canvas.height) {
                platforms.shift();
                addPlatform(platforms[platforms.length-1].m + 1);
            }
        }

        // 4. 추락 및 게임오버
        if (player.y > canvas.height + 50) {
            gameState = 'dead';
            playCleanSound(100, 'sawtooth', 0.3, 0.3); // 쿵 소리
            finalMEl.innerText = `최종 기록: ${maxM} M`;
            gameOverEl.style.display = 'block';
        }
    }

    function drawPlayer() {
        const p = player;
        const x = p.x; const y = p.y;

        // 기본 캐릭터 (블럭 스타일)
        ctx.fillStyle = "#ffcc99"; ctx.fillRect(x + 6, y, 24, 24); // 머리
        ctx.fillStyle = "#e74c3c"; ctx.fillRect(x, y + 24, 36, 24); // 몸통
        ctx.fillStyle = "#2c3e50"; ctx.fillRect(x + 4, y + 48, 12, 12); // 왼다리
        ctx.fillRect(x + 20, y + 48, 12, 12); // 오른다리

        // 눈
        ctx.fillStyle = "black";
        ctx.fillRect(x + 10, y + 6, 4, 4); ctx.fillRect(x + 22, y + 6, 4, 4);

        // 6. 아이템 장착 시스템
        // 50M: 신발 (파란색 블럭)
        if (maxM >= 50) {
            ctx.fillStyle = "#3498db";
            ctx.fillRect(x + 2, y + 54, 16, 6); ctx.fillRect(x + 18, y + 54, 16, 6);
        }
        // 100M: 금목걸이
        if (maxM >= 100) {
            ctx.fillStyle = "#f1c40f";
            ctx.fillRect(x + 6, y + 24, 24, 4);
        }
        // 150M: 팔찌
        if (maxM >= 150) {
            ctx.fillStyle = "#f1c40f";
            ctx.fillRect(x - 2, y + 36, 4, 4); // 왼팔찌
        }
        // 200M: 선글라스
        if (maxM >= 200) {
            ctx.fillStyle = "rgba(0,0,0,0.8)";
            ctx.fillRect(x + 6, y + 6, 24, 6);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 밤하늘 별
        ctx.fillStyle = "white";
        for(let i=0; i<30; i++) ctx.fillRect((i*150)%canvas.width, (i*200+maxM*2)%canvas.height, 2, 2);

        // 발판
        platforms.forEach(p => {
            ctx.fillStyle = "#34495e"; ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = "#5d6d7e"; ctx.fillRect(p.x, p.y, p.w, 4);
        });

        drawPlayer();
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    
    document.getElementById('restart-btn').onclick = initGame;
    initGame(); loop();
</script>
</body>
</html>
