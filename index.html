<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Song Young-min Guitar Lab - Climber Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050816; font-family: 'Arial', sans-serif; user-select: none; touch-action: none; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* 컨트롤 UI: 최하단 배치 (10px) */
        #joystick-container { position: absolute; bottom: 10px; left: 30px; width: 100px; height: 100px; background: rgba(255, 255, 255, 0.1); border-radius: 50%; pointer-events: auto; border: 1px solid rgba(255,255,255,0.2); }
        #joystick-knob { position: absolute; top: 30px; left: 30px; width: 40px; height: 40px; background: rgba(255, 255, 255, 0.6); border-radius: 50%; }
        #btn-jump { position: absolute; bottom: 10px; right: 140px; width: 85px; height: 85px; background: #000080; border-radius: 50%; border: 3px solid #ffffff; color: white; font-size: 16px; font-weight: bold; display: flex; justify-content: center; align-items: center; pointer-events: auto; }
        #btn-skill { position: absolute; bottom: 10px; right: 30px; width: 85px; height: 85px; background: #e74c3c; border-radius: 50%; border: 4px solid #ffd700; color: white; font-size: 16px; font-weight: bold; display: none; justify-content: center; align-items: center; pointer-events: auto; box-shadow: 0 0 15px #e74c3c; }

        /* 워터마크/점수: 상단 배치 */
        #watermark { position: absolute; top: 15px; width: 100%; text-align: center; color: rgba(255,255,255,0.3); font-size: 11px; letter-spacing: 1.5px; z-index: 5; }
        #altitude { position: absolute; top: 40px; width: 100%; text-align: center; font-size: 28px; color: #ffd700; font-weight: bold; text-shadow: 0 2px 4px #000; z-index: 10; }
        
        #game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); border: 2px solid #ffd700; padding: 30px; color: white; text-align: center; display: none; pointer-events: auto; border-radius: 15px; width: 260px; z-index: 20; }
        #restart-btn { margin-top: 15px; padding: 12px 24px; background: #ffd700; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #status { position: absolute; top: 80px; left: 20px; color: #fff; font-size: 14px; text-align: left; z-index: 10; }
    </style>
</head>
<body>

<div id="altitude">0 M</div>
<div id="status"></div>
<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
    <div id="joystick-container"><div id="joystick-knob"></div></div>
    <div id="btn-jump">JUMP</div>
    <div id="btn-skill">FLY</div>
    <div id="game-over">
        <h2 style="color: #e74c3c; margin-top:0;">GAME OVER</h2>
        <p id="final-m" style="font-size: 18px;"></p>
        <button id="restart-btn">다시 시작하시겠습니까?</button>
    </div>
    <div id="watermark">SONG, YOUNG-MIN Guitar Lab</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const altitudeEl = document.getElementById('altitude');
    const statusEl = document.getElementById('status');
    const gameOverEl = document.getElementById('game-over');
    const skillBtn = document.getElementById('btn-skill');

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    // --- 효과음 엔진 (깔끔한 버전 복원) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

    function playLandSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function playGameOverSound() {
        if (!audioCtx) return;
        const notes = [440, 392, 349, 261];
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.15);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime + i * 0.15);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.15 + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + i * 0.15);
            osc.stop(audioCtx.currentTime + i * 0.15 + 0.1);
        });
    }

    // --- 게임 물리 변수 ---
    const gravity = 0.7;
    const platHeight = 20;
    const platGap = 130; // 사다리 간격 적당히 유지
    let platforms = [];
    let maxM = 0;
    let gameState = 'playing';
    let jumpCount = 0;
    let shoeShield = 0; 
    let hasCape = false; 
    let isFlying = false; 
    let flyTimer = 0;

    const player = { x: 0, y: 0, width: 36, height: 60, vx: 0, vy: 0, speed: 6, jumpPower: -17 };

    function initGame() {
        platforms = []; maxM = 0; jumpCount = 0; gameState = 'playing';
        shoeShield = 0; hasCape = false; isFlying = false; flyTimer = 0;
        gameOverEl.style.display = 'none'; skillBtn.style.display = 'none';
        altitudeEl.innerText = "0 M"; statusEl.innerText = "";
        player.x = canvas.width / 2 - 18; player.y = canvas.height - 150; player.vy = 0;
        platforms.push({ x: 0, y: canvas.height - 50, w: canvas.width, h: 50, type: 'normal', m: 0 });
        for (let i = 1; i <= 20; i++) spawnPlatform(i);
    }

    // [핵심] 올라갈수록 좁아지는 발판 생성 로직
    function spawnPlatform(mValue) {
        const baseW = 120; // 시작 폭
        const minW = 50;   // 최소 폭
        // mValue(고도)에 비례하여 폭(w)을 점진적으로 줄임
        const currentW = Math.max(minW, baseW - (mValue * 0.5)); 

        const types = ['normal', 'move', 'break', 'spike'];
        let type = types[0];
        const rand = Math.random();
        if (mValue > 5) {
            if (rand > 0.85) type = 'move';
            else if (rand > 0.75) type = 'break';
            else if (rand > 0.6) type = 'spike';
        }

        let spikeRange = { start: 0, count: 0 };
        if (type === 'spike') {
            const maxSpikes = Math.floor(currentW / 20);
            spikeRange.count = Math.max(1, Math.floor(maxSpikes * 0.5)); 
            spikeRange.start = Math.floor(Math.random() * (maxSpikes - spikeRange.count + 1));
        }

        platforms.push({
            x: Math.random() * (canvas.width - currentW),
            y: canvas.height - (mValue * platGap) - 50,
            w: currentW, h: platHeight, type: type, m: mValue,
            dir: Math.random() > 0.5 ? 1.5 : -1.5, broken: false, breakTimer: 0,
            spikeRange: spikeRange
        });
    }

    // 입력 처리
    let moveDir = 0;
    const joystick = document.getElementById('joystick-container');
    const knob = document.getElementById('joystick-knob');
    joystick.addEventListener('touchstart', (e) => { initAudio(); handleMove(e); });
    joystick.addEventListener('touchmove', handleMove);
    function handleMove(e) {
        if (gameState !== 'playing') return;
        const touch = e.touches[0];
        const rect = joystick.getBoundingClientRect();
        const dx = touch.clientX - (rect.left + rect.width/2);
        const dist = Math.min(Math.abs(dx), 40);
        knob.style.transform = `translateX(${Math.sign(dx) * dist}px)`;
        moveDir = (dx / 40);
    }
    joystick.addEventListener('touchend', () => { knob.style.transform = `translate(0,0)`; moveDir = 0; });

    document.getElementById('btn-jump').addEventListener('touchstart', (e) => {
        e.preventDefault(); initAudio();
        if (gameState !== 'playing' || isFlying) return;
        if (jumpCount < 2) { player.vy = player.jumpPower; jumpCount++; }
    });

    skillBtn.addEventListener('touchstart', (e) => {
        e.preventDefault(); initAudio();
        if (!hasCape || isFlying) return;
        isFlying = true; flyTimer = 180; player.vy = -12;
    });

    function update() {
        if (gameState !== 'playing') return;

        if (isFlying) { player.vy = -8; flyTimer--; if (flyTimer <= 0) isFlying = false; }
        else { player.vy += gravity; }

        player.x += moveDir * player.speed;
        player.y += player.vy;

        if (player.x < 0) player.x = 0;
        if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

        platforms.forEach((p) => {
            if (p.type === 'move') { p.x += p.dir; if (p.x < 0 || p.x + p.w > canvas.width) p.dir *= -1; }
            if (player.vy > 0 && player.x + player.width > p.x && player.x < p.x + p.w &&
                player.y + player.height > p.y && player.y + player.height < p.y + p.h + player.vy) {
                
                if (p.type === 'spike') {
                    const mid = player.x + 18;
                    if (mid >= p.x + p.spikeRange.start*20 && mid <= p.x + (p.spikeRange.start+p.spikeRange.count)*20) {
                        if (shoeShield > 0) { shoeShield--; player.vy = -20; return; }
                        else { gameOver(); return; }
                    }
                }

                if (p.type === 'break') p.broken = true;
                if (!p.broken || p.breakTimer < 10) {
                    if (player.vy > 1) playLandSound();
                    player.y = p.y - player.height; player.vy = 0; jumpCount = 0;
                    if (p.m > maxM) { maxM = p.m; altitudeEl.innerText = `${maxM} M`; checkItemUnlock(); }
                }
            }
            if (p.broken) p.breakTimer++;
        });

        // 카메라 스크롤
        if (player.y < canvas.height / 2) {
            let diff = canvas.height / 2 - player.y;
            player.y += diff;
            platforms.forEach(p => p.y += diff);
        }

        // [핵심] 발판 끊김 방지 및 무한 생성
        if (platforms.length > 0 && platforms[platforms.length - 1].y > -platGap) {
            spawnPlatform(platforms[platforms.length - 1].m + 1);
        }
        if (platforms.length > 0 && platforms[0].y > canvas.height + 400) {
            platforms.shift();
        }

        if (player.y > canvas.height + 250) gameOver();

        statusEl.innerText = shoeShield > 0 ? `👞 신발 방어: ${shoeShield}회` : "";
        if (isFlying) statusEl.innerText += `\n🚀 비행중: ${Math.ceil(flyTimer/60)}s`;
    }

    function checkItemUnlock() {
        if (maxM >= 50 && shoeShield === 0 && maxM < 55) shoeShield = 2;
        if (maxM >= 100 && !hasCape) { hasCape = true; skillBtn.style.display = 'flex'; }
    }

    function gameOver() {
        if (gameState === 'dead') return;
        gameState = 'dead';
        playGameOverSound();
        document.getElementById('final-m').innerText = `최종 기록: ${maxM} M`;
        gameOverEl.style.display = 'block';
    }

    // --- [디테일 그리기] 얼굴 사라지는 문제 해결 ---
    function drawPlayer() {
        const x = player.x; const y = player.y;
        
        // 망토 그리기
        if (hasCape) { ctx.fillStyle = isFlying ? "#f1c40f" : "#e74c3c"; ctx.fillRect(x - 5, y + 25, 46, 30); }

        // 몸체 블록 그리기
        ctx.fillStyle = "#ffcc99"; ctx.fillRect(x + 6, y, 24, 24); // 머리
        ctx.fillStyle = "#e74c3c"; ctx.fillRect(x, y + 24, 36, 24); // 몸통
        ctx.fillStyle = "#2c3e50"; ctx.fillRect(x + 4, y + 48, 10, 12); ctx.fillRect(x + 22, y + 48, 10, 12); // 다리
        
        // 얼굴 디테일 (눈) 그리기
        ctx.fillStyle = isFlying ? "gold" : "black"; 
        ctx.fillRect(x + 10, y + 6, 4, 4); ctx.fillRect(x + 22, y + 6, 4, 4);

        // 아이템 장착 시각화
        if (maxM >= 50) { // 신발
            ctx.fillStyle = shoeShield > 0 ? "#3498db" : "rgba(52, 152, 219, 0.3)";
            ctx.fillRect(x+2, y+54, 14, 6); ctx.fillRect(x+20, y+54, 14, 6); 
        }
        if (maxM >= 150) { ctx.fillStyle = "#f1c40f"; ctx.fillRect(x-2, y+36, 4, 4); } // 팔찌
        if (maxM >= 200) { ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(x+6, y+6, 24, 6); } // 선글라스
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 배경 별
        ctx.fillStyle = "white";
        for(let i=0; i<20; i++) ctx.fillRect((i*157)%canvas.width, (i*190 + maxM*3)%canvas.height, 2, 2);

        // 플랫폼 그리기
        platforms.forEach(p => {
            if (p.type === 'break' && p.breakTimer > 10) return;
            let color = "#34495e";
            if (p.type === 'move') color = "#2ecc71";
            if (p.type === 'break') color = "#e67e22";
            if (p.type === 'spike') color = "#c0392b";

            ctx.fillStyle = color; ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = "rgba(255,255,255,0.2)"; ctx.fillRect(p.x, p.y, p.w, 4);
            
            if (p.type === 'spike') {
                ctx.fillStyle = "#ecf0f1";
                for(let i = p.spikeRange.start; i < p.spikeRange.start + p.spikeRange.count; i++) {
                    ctx.beginPath(); ctx.moveTo(p.x + i*20 + 5, p.y); ctx.lineTo(p.x + i*20 + 10, p.y - 10); ctx.lineTo(p.x + i*20 + 15, p.y); ctx.fill();
                }
            }
        });

        drawPlayer(); // 수정된 그리기 함수 호출
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    document.getElementById('restart-btn').onclick = () => { initAudio(); initGame(); };
    initGame(); loop();
</script>
</body>
</html>
