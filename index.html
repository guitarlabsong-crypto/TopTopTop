<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Night Sky Block Climber</title>
    <style>
        /* 3. 게임 배경: 밤하늘 */
        body { margin: 0; overflow: hidden; background: #0b1026; font-family: sans-serif; user-select: none; -webkit-touch-callout: none; }
        canvas { display: block; }

        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* 4. 조이스틱 디자인 유지 */
        #joystick-container {
            position: absolute; bottom: 40px; left: 40px;
            width: 120px; height: 120px; background: rgba(255, 255, 255, 0.1);
            border-radius: 50%; pointer-events: auto; touch-action: none;
            border: 2px solid rgba(255,255,255,0.3);
        }
        #joystick-knob {
            position: absolute; top: 35px; left: 35px;
            width: 50px; height: 50px; background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
        }

        /* 5. 점프 버튼: 네이비 색상 */
        #btn-jump {
            position: absolute; bottom: 50px; right: 40px;
            width: 90px; height: 90px; background: #000080; /* Navy */
            border-radius: 50%; border: 3px solid #ffffff;
            color: white; font-size: 18px; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            pointer-events: auto; touch-action: none; box-shadow: 0 0 15px rgba(0,0,128,0.5);
        }
        
        #score { position: absolute; top: 30px; width: 100%; text-align: center; font-size: 20px; color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
    </style>
</head>
<body>

<div id="score">별빛 포도를 모으세요!</div>
<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
    <div id="joystick-container"><div id="joystick-knob"></div></div>
    <div id="btn-jump">JUMP</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 오디오 설정
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(f, d, g) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator();
        const gn = audioCtx.createGain();
        o.connect(gn); gn.connect(audioCtx.destination);
        o.frequency.setValueAtTime(f, audioCtx.currentTime);
        gn.gain.setValueAtTime(g, audioCtx.currentTime);
        gn.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    const gravity = 0.8;
    const blockSize = 6; 
    let platforms = [];
    let grapes = [];
    let gameState = 'playing';

    const player = {
        x: 0, y: 0,
        width: blockSize * 6, height: blockSize * 12,
        velocityX: 0, velocityY: 0,
        speed: 7, jumpPower: -24,
        onGround: false, dizzyAngle: 0
    };

    // 2. 착지 계단(플랫폼) 생성 로직 보강
    function initGame() {
        platforms = [];
        grapes = [];
        gameState = 'playing';
        player.x = canvas.width / 2 - player.width / 2;
        player.y = canvas.height - 150;
        player.velocityY = 0;

        // 시작 바닥 (확실히 보이게)
        platforms.push({ x: 0, y: canvas.height - 60, w: canvas.width, h: 60 });

        // 올라가는 계단들
        for (let i = 1; i < 20; i++) {
            platforms.push({
                x: Math.random() * (canvas.width - 120),
                y: canvas.height - (i * 150),
                w: 110,
                h: 25
            });
        }

        // 포도송이 (작은 블럭들)
        const top = platforms[platforms.length - 1];
        const gx = top.x + top.w / 2;
        const gy = top.y - 50;
        const pattern = [[0,0], [1,0], [-1,0], [0.5, 1], [-0.5, 1], [0, 2]];
        pattern.forEach(p => {
            grapes.push({ x: gx + p[0]*10, y: gy + p[1]*10, size: 8, active: true });
        });
    }

    // 조이스틱 로직
    const joystick = document.getElementById('joystick-container');
    const knob = document.getElementById('joystick-knob');
    let moveX = 0;

    joystick.addEventListener('touchmove', (e) => {
        if (gameState === 'dead') return;
        const touch = e.touches[0];
        const rect = joystick.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        let dx = touch.clientX - centerX;
        let dy = touch.clientY - centerY;
        const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
        const angle = Math.atan2(dy, dx);
        
        knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
        moveX = (Math.cos(angle) * dist) / 50;
    });

    joystick.addEventListener('touchend', () => {
        knob.style.transform = `translate(0,0)`;
        moveX = 0;
    });

    document.getElementById('btn-jump').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (player.onGround && gameState === 'playing') {
            player.velocityY = player.jumpPower;
            player.onGround = false;
        }
    });

    function update() {
        if (gameState === 'dead') {
            player.velocityY += gravity;
            player.y += player.velocityY;
        } else {
            player.velocityX = moveX * player.speed;
            player.velocityY += gravity;
            player.x += player.velocityX;
            player.y += player.velocityY;

            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            player.onGround = false;
            platforms.forEach(p => {
                if (player.velocityY > 0 &&
                    player.x + player.width > p.x && player.x < p.x + p.w &&
                    player.y + player.height > p.y && player.y + player.height < p.y + p.h + player.velocityY) {
                    if (!player.onGround) playSound(150, 0.1, 0.2); // 탁 소리
                    player.y = p.y - player.height;
                    player.velocityY = 0;
                    player.onGround = true;
                }
            });

            if (player.y < canvas.height / 2) {
                let diff = canvas.height / 2 - player.y;
                player.y += diff;
                platforms.forEach(p => p.y += diff);
                grapes.forEach(g => g.y += diff);
            }

            grapes.forEach(g => {
                if (g.active && Math.abs(player.x - g.x) < 30 && Math.abs(player.y - g.y) < 40) g.active = false;
            });

            if (player.y > canvas.height + 100) {
                gameState = 'dead';
                playSound(80, 0.5, 0.5); // 쿵 소리
                setTimeout(initGame, 2000);
            }
        }
    }

    // 1. 캐릭터 보강: 블록 팔다리 및 얼굴 디테일
    function drawPlayer() {
        const p = player;
        ctx.save();
        
        // 몸통/다리/팔
        ctx.fillStyle = "#ffcc99"; // 피부
        ctx.fillRect(p.x + 6, p.y - 6, 24, 24); // 머리
        ctx.fillStyle = "#e74c3c"; // 옷
        ctx.fillRect(p.x, p.y + 18, 36, 30); // 몸통
        
        // 팔다리 블럭
        ctx.fillStyle = "#ffcc99";
        ctx.fillRect(p.x - 6, p.y + 18, 6, 24); // 왼팔
        ctx.fillRect(p.x + 36, p.y + 18, 6, 24); // 오른팔
        ctx.fillStyle = "#2c3e50";
        ctx.fillRect(p.x + 6, p.y + 48, 10, 24); // 왼다리
        ctx.fillRect(p.x + 20, p.y + 48, 10, 24); // 오른다리

        // 얼굴 디테일
        if (gameState === 'dead') {
            p.dizzyAngle += 0.2;
            ctx.fillStyle = "white";
            ctx.font = "bold 14px Arial";
            ctx.fillText("X X", p.x + 8, p.y + 10); // 눈 빙글빙글 대신 X자
        } else {
            ctx.fillStyle = "black";
            ctx.fillRect(p.x + 10, p.y + 2, 4, 4); // 눈
            ctx.fillRect(p.x + 22, p.y + 2, 4, 4);
            ctx.fillStyle = "red";
            ctx.fillRect(p.x + 14, p.y + 12, 8, 2); // 입
        }
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 밤하늘 배경 (별 추가)
        ctx.fillStyle = "white";
        for(let i=0; i<50; i++) ctx.fillRect((i*137)%canvas.width, (i*243)%canvas.height, 2, 2);

        // 발판 그리기 (밤에 어울리는 돌 블럭)
        platforms.forEach(p => {
            ctx.fillStyle = "#34495e";
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = "#5d6d7e";
            ctx.fillRect(p.x, p.y, p.w, 5); // 윗면 강조
        });

        // 포도 (보라색 블럭)
        grapes.forEach(g => {
            if (g.active) {
                ctx.fillStyle = "#8e44ad";
                ctx.fillRect(g.x, g.y, g.size, g.size);
            }
        });

        drawPlayer();
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    initGame(); loop();
</script>
</body>
</html>
