<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Square Climber Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        canvas { display: block; background: #a0d8ef; }

        /* UI 레이아웃 */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* UI 배경은 터치 통과 */
        }

        /* 하단 컨트롤러 영역 */
        .controls {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 20px;
            box-sizing: border-box; pointer-events: auto;
        }

        .joystick-area { display: flex; gap: 10px; }
        .btn {
            width: 70px; height: 70px; background: rgba(255, 255, 255, 0.5);
            border-radius: 10px; display: flex; justify-content: center;
            align-items: center; font-weight: bold; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: rgba(255, 255, 255, 0.8); }
        
        #score { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 20px; color: white; text-shadow: 1px 1px 2px #000; }
    </style>
</head>
<body>

<div id="score">과일을 찾아 꼭대기로 가세요!</div>
<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
    <div class="controls">
        <div class="joystick-area">
            <div class="btn" id="btnLeft">◀</div>
            <div class="btn" id="btnRight">▶</div>
        </div>
        <div class="btn" id="btnJump">JUMP</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // 게임 설정
    const gravity = 0.6;
    let scrollY = 0;
    let fruitsCollected = 0;

    // 캐릭터 (마인크래프트 스타일 사각형)
    const player = {
        x: canvas.width / 2 - 15,
        y: canvas.height - 100,
        width: 30,
        height: 45,
        velocityX: 0,
        velocityY: 0,
        speed: 5,
        jumpPower: -15,
        onGround: false,
        color: '#FFCC99' // 피부색
    };

    // 발판 및 과일 데이터
    let platforms = [];
    let fruit = { x: 0, y: 0, size: 20, active: true };

    function initGame() {
        platforms = [];
        // 바닥
        platforms.push({ x: 0, y: canvas.height - 50, w: canvas.width, h: 50 });
        
        // 계단형 발판 생성 (위로 갈수록 좁아짐)
        for (let i = 1; i < 15; i++) {
            platforms.push({
                x: Math.random() * (canvas.width - 80),
                y: canvas.height - (i * 120),
                w: 80,
                h: 15
            });
        }
        // 꼭대기 과일 위치
        const topPlatform = platforms[platforms.length - 1];
        fruit.x = topPlatform.x + topPlatform.w / 2;
        fruit.y = topPlatform.y - 30;
        fruit.active = true;
    }

    // 터치 입력 처리
    let keys = { left: false, right: false };
    
    document.getElementById('btnLeft').ontouchstart = () => keys.left = true;
    document.getElementById('btnLeft').ontouchend = () => keys.left = false;
    document.getElementById('btnRight').ontouchstart = () => keys.right = true;
    document.getElementById('btnRight').ontouchend = () => keys.right = false;
    document.getElementById('btnJump').ontouchstart = () => {
        if (player.onGround) {
            player.velocityY = player.jumpPower;
            player.onGround = false;
        }
    };

    function update() {
        // 이동 로직
        if (keys.left) player.velocityX = -player.speed;
        else if (keys.right) player.velocityX = player.speed;
        else player.velocityX *= 0.8;

        player.velocityY += gravity;
        player.x += player.velocityX;
        player.y += player.velocityY;

        // 화면 밖 나가지 않게 조절
        if (player.x < 0) player.x = 0;
        if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

        // 플랫폼 충돌 검사
        player.onGround = false;
        platforms.forEach(p => {
            if (player.velocityY > 0 &&
                player.x + player.width > p.x &&
                player.x < p.x + p.w &&
                player.y + player.height > p.y &&
                player.y + player.height < p.y + p.h + player.velocityY) {
                player.y = p.y - player.height;
                player.velocityY = 0;
                player.onGround = true;
            }
        });

        // 카메라 스크롤 (캐릭터가 화면 중앙보다 위로 가면 스크롤)
        if (player.y < canvas.height / 2) {
            let diff = canvas.height / 2 - player.y;
            scrollY += diff;
            player.y += diff;
            platforms.forEach(p => p.y += diff);
            fruit.y += diff;
        }

        // 과일 획득 검사
        if (fruit.active && 
            Math.hypot(player.x + player.width/2 - fruit.x, player.y + player.height/2 - fruit.y) < 30) {
            fruit.active = false;
            fruitsCollected++;
            scoreEl.innerText = `과일 획득! 총 ${fruitsCollected}개`;
            setTimeout(initGame, 1000); // 1초 후 리셋 (다음 스테이지 느낌)
        }

        // 게임 오버 (화면 아래로 떨어지면)
        if (player.y > canvas.height) {
            initGame();
            player.y = canvas.height - 100;
            player.x = canvas.width / 2;
            player.velocityY = 0;
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 발판 그리기
        ctx.fillStyle = "#5D4037";
        platforms.forEach(p => {
            ctx.fillRect(p.x, p.y, p.w, p.h);
        });

        // 과일 그리기 (빨간 사과)
        if (fruit.active) {
            ctx.fillStyle = "red";
            ctx.beginPath();
            ctx.arc(fruit.x, fruit.y, fruit.size/2, 0, Math.PI * 2);
            ctx.fill();
        }

        // 캐릭터 그리기 (마인크래프트 스타일)
        // 몸통
        ctx.fillStyle = "#3498db"; 
        ctx.fillRect(player.x, player.y + 15, player.width, 30);
        // 머리
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x + 5, player.y, 20, 20);
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    initGame();
    gameLoop();
</script>

</body>
</html>
